version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - React Router
  - TanStack Query
  - React Hook Form
  - Zod
  - Lucide React
  - Spring Boot REST API backend
routes:
  - path: /
    file: frontend/src/features/public-site/pages/HomePage.tsx
    auth_required: false
    description: Public home page for BIBE Estetica.
  - path: /tratamientos/:slug
    file: frontend/src/features/public-site/pages/TreatmentCategoryPage.tsx
    auth_required: false
    description: Public treatment category page.
  - path: /login
    file: frontend/src/features/auth/pages/LoginPage.tsx
    auth_required: false
    description: Login page for admin and client users.
  - path: /register
    file: frontend/src/features/auth/pages/RegisterPage.tsx
    auth_required: false
    description: Client registration page.
  - path: /app/book
    file: frontend/src/features/client/pages/ClientBookPage.tsx
    auth_required: true
    description: Client flow to request an online appointment.
  - path: /app/book/success
    file: frontend/src/features/client/pages/ClientBookingSuccessPage.tsx
    auth_required: true
    description: Appointment request success page.
  - path: /app/appointments
    file: frontend/src/features/client/pages/ClientAppointmentsPage.tsx
    auth_required: true
    description: Client appointment list, filters, history, and cancellation.
  - path: /app/profile
    file: frontend/src/features/client/pages/ClientProfilePage.tsx
    auth_required: true
    description: Client profile and editable account details.
  - path: /admin/dashboard
    file: frontend/src/features/admin/pages/AdminDashboardPage.tsx
    auth_required: true
    description: Admin operating dashboard for upcoming appointments and configuration alerts.
  - path: /admin/appointments
    file: frontend/src/features/admin/pages/AdminAppointmentsPage.tsx
    auth_required: true
    description: Admin appointment list, filters, detail, and status transitions.
  - path: /admin/calendar
    file: frontend/src/features/admin/pages/AdminCalendarPage.tsx
    auth_required: true
    description: Admin weekly calendar for availability and appointment creation.
  - path: /admin/services
    file: frontend/src/features/admin/pages/AdminServicesPage.tsx
    auth_required: true
    description: Admin service categories, services, online booking flags, and service-professional assignments.
  - path: /admin/professionals
    file: frontend/src/features/admin/pages/AdminProfessionalsPage.tsx
    auth_required: true
    description: Admin professional catalog and professional-service assignments.
  - path: /admin/business-hours
    file: frontend/src/features/admin/pages/AdminBusinessHoursPage.tsx
    auth_required: true
    description: Admin business hours by professional.
  - path: /admin/availability-blocks
    file: frontend/src/features/admin/pages/AdminAvailabilityBlocksPage.tsx
    auth_required: true
    description: Admin availability blocks for vacations, sick leave, holidays, manual blocks, and other exceptions.
  - path: /admin/clients
    file: frontend/src/features/admin/pages/AdminClientsPage.tsx
    auth_required: true
    description: Admin client catalog, history, activation, and profile management.
features:
  - name: Authentication and role routing
    description: Login, registration, session persistence, logout, and role-based route protection.
    files:
      - frontend/src/features/auth/pages/LoginPage.tsx
      - frontend/src/features/auth/pages/RegisterPage.tsx
      - frontend/src/features/auth/context/AuthProvider.tsx
      - frontend/src/features/auth/components/AuthGate.tsx
      - frontend/src/features/auth/components/PublicOnlyRoute.tsx
      - frontend/src/app/router/router.tsx
    entry_route: /login
    user_interactions:
      - Fill email and password.
      - Submit login form.
      - Register a new client account.
      - Try protected admin and client routes with the wrong role.
      - Logout from admin and client layouts.
    api_calls:
      - method: POST
        endpoint: /api/auth/login
      - method: POST
        endpoint: /api/auth/register
      - method: GET
        endpoint: /api/auth/me
      - method: PUT
        endpoint: /api/auth/me
    auth_required: false
  - name: Client appointment booking
    description: Client selects category, service, professional, available week slot, optional notes, and requests an appointment.
    files:
      - frontend/src/features/client/pages/ClientBookPage.tsx
      - frontend/src/features/client/pages/ClientBookingSuccessPage.tsx
      - frontend/src/features/availability/api/availabilityApi.ts
      - frontend/src/features/appointments/api/appointmentsApi.ts
    entry_route: /app/book
    user_interactions:
      - Select a treatment category.
      - Select an online-bookable service.
      - Select a compatible professional.
      - Switch visible week.
      - Choose an available slot.
      - Add optional notes.
      - Submit appointment request.
      - View success page.
    api_calls:
      - method: GET
        endpoint: /api/service-categories
      - method: GET
        endpoint: /api/services
      - method: GET
        endpoint: /api/professionals
      - method: GET
        endpoint: /api/availability
      - method: POST
        endpoint: /api/appointments
    auth_required: true
  - name: Client appointments and cancellation
    description: Client views appointments by state and cancels pending or confirmed appointments with a reason.
    files:
      - frontend/src/features/client/pages/ClientAppointmentsPage.tsx
      - frontend/src/features/appointments/api/appointmentsApi.ts
    entry_route: /app/appointments
    user_interactions:
      - View pending, confirmed, and history sections.
      - Filter by all, pending, confirmed, or history.
      - Open cancellation modal.
      - Validate required cancellation reason.
      - Confirm cancellation.
    api_calls:
      - method: GET
        endpoint: /api/appointments
      - method: PATCH
        endpoint: /api/appointments/{id}/cancel-by-client
    auth_required: true
  - name: Client profile
    description: Client views and updates editable profile fields.
    files:
      - frontend/src/features/client/pages/ClientProfilePage.tsx
      - frontend/src/features/auth/api/authApi.ts
    entry_route: /app/profile
    user_interactions:
      - View account identity and status.
      - Enable edit for full name and phone.
      - Save valid profile changes.
      - Validate empty full name.
    api_calls:
      - method: PUT
        endpoint: /api/auth/me
      - method: GET
        endpoint: /api/auth/me
    auth_required: true
  - name: Admin dashboard
    description: Admin reviews operational metrics, upcoming appointments, quick actions, and configuration alerts.
    files:
      - frontend/src/features/admin/pages/AdminDashboardPage.tsx
    entry_route: /admin/dashboard
    user_interactions:
      - Refresh metrics.
      - Click metric cards to open filtered appointments.
      - Open calendar from quick action.
      - Open clients from quick action.
      - Open configuration alert links.
    api_calls:
      - method: GET
        endpoint: /api/appointments
      - method: GET
        endpoint: /api/professionals
      - method: GET
        endpoint: /api/services
      - method: GET
        endpoint: /api/business-hours
    auth_required: true
  - name: Admin services and categories
    description: Admin manages service categories, services, booking flags, and service-professional assignment.
    files:
      - frontend/src/features/admin/pages/AdminServicesPage.tsx
      - frontend/src/features/services/api/servicesApi.ts
      - frontend/src/features/services/api/serviceCategoriesApi.ts
    entry_route: /admin/services
    user_interactions:
      - Create and edit categories.
      - Create and edit services.
      - Toggle online booking and evaluation-required settings.
      - Assign all or selected professionals.
      - Search, filter, sort, deactivate, and reactivate services.
    api_calls:
      - method: GET
        endpoint: /api/service-categories
      - method: POST
        endpoint: /api/service-categories
      - method: PUT
        endpoint: /api/service-categories/{id}
      - method: PATCH
        endpoint: /api/service-categories/{id}/active
      - method: GET
        endpoint: /api/services
      - method: POST
        endpoint: /api/services
      - method: PUT
        endpoint: /api/services/{id}
      - method: PATCH
        endpoint: /api/services/{id}/active
      - method: GET
        endpoint: /api/services/{id}/professionals
      - method: PUT
        endpoint: /api/services/{id}/professionals
    auth_required: true
  - name: Admin professionals
    description: Admin manages professional records and service assignments.
    files:
      - frontend/src/features/admin/pages/AdminProfessionalsPage.tsx
      - frontend/src/features/professionals/api/professionalsApi.ts
    entry_route: /admin/professionals
    user_interactions:
      - Create and edit professionals.
      - Assign all or selected services.
      - Filter assignment choices by category.
      - Search, sort, deactivate, and reactivate professionals.
    api_calls:
      - method: GET
        endpoint: /api/professionals
      - method: POST
        endpoint: /api/professionals
      - method: PUT
        endpoint: /api/professionals/{id}
      - method: PATCH
        endpoint: /api/professionals/{id}/active
      - method: GET
        endpoint: /api/professionals/{id}/services
      - method: PUT
        endpoint: /api/professionals/{id}/services
    auth_required: true
  - name: Admin business hours
    description: Admin creates weekly working hour ranges for each professional.
    files:
      - frontend/src/features/admin/pages/AdminBusinessHoursPage.tsx
      - frontend/src/features/business-hours/api/businessHoursApi.ts
    entry_route: /admin/business-hours
    user_interactions:
      - Select professional.
      - Create business hour.
      - Edit start and end time.
      - Sort by day or time.
      - Deactivate and reactivate hours.
    api_calls:
      - method: GET
        endpoint: /api/business-hours
      - method: POST
        endpoint: /api/business-hours
      - method: PUT
        endpoint: /api/business-hours/{id}
      - method: PATCH
        endpoint: /api/business-hours/{id}/active
    auth_required: true
  - name: Admin calendar and appointment creation
    description: Admin reviews weekly availability and creates confirmed appointments from valid slots.
    files:
      - frontend/src/features/admin/pages/AdminCalendarPage.tsx
      - frontend/src/features/availability/api/availabilityApi.ts
      - frontend/src/features/appointments/api/appointmentsApi.ts
      - frontend/src/features/clients/api/clientsApi.ts
    entry_route: /admin/calendar
    user_interactions:
      - Select category, service, and compatible professional.
      - Switch week.
      - Click available slot.
      - Create appointment for existing client.
      - Create new client and appointment together.
      - Reset filters.
    api_calls:
      - method: GET
        endpoint: /api/availability
      - method: GET
        endpoint: /api/appointments
      - method: POST
        endpoint: /api/appointments
      - method: GET
        endpoint: /api/clients
      - method: POST
        endpoint: /api/clients
    auth_required: true
  - name: Admin appointments
    description: Admin filters appointments, opens detail, and performs valid status transitions.
    files:
      - frontend/src/features/admin/pages/AdminAppointmentsPage.tsx
      - frontend/src/features/appointments/api/appointmentsApi.ts
    entry_route: /admin/appointments
    user_interactions:
      - Filter by status tabs, date range, professional, and client.
      - Use quick ranges.
      - Open appointment detail.
      - Confirm pending appointment.
      - Reject pending appointment with reason.
      - Cancel active appointment with reason.
      - Complete confirmed appointment.
      - Mark confirmed appointment as no-show.
    api_calls:
      - method: GET
        endpoint: /api/appointments
      - method: PATCH
        endpoint: /api/appointments/{id}/confirm
      - method: PATCH
        endpoint: /api/appointments/{id}/reject
      - method: PATCH
        endpoint: /api/appointments/{id}/cancel-by-admin
      - method: PATCH
        endpoint: /api/appointments/{id}/complete
      - method: PATCH
        endpoint: /api/appointments/{id}/no-show
    auth_required: true
  - name: Admin availability blocks
    description: Admin creates, edits, deactivates, and reactivates availability blocks for professionals.
    files:
      - frontend/src/features/admin/pages/AdminAvailabilityBlocksPage.tsx
      - frontend/src/features/availability-blocks/api/availabilityBlocksApi.ts
    entry_route: /admin/availability-blocks
    user_interactions:
      - Create block with type, start, end, and reason.
      - Edit block.
      - Sort block list.
      - Deactivate and reactivate block.
      - Verify affected availability in calendar.
    api_calls:
      - method: GET
        endpoint: /api/availability-blocks
      - method: POST
        endpoint: /api/availability-blocks
      - method: PUT
        endpoint: /api/availability-blocks/{id}
      - method: PATCH
        endpoint: /api/availability-blocks/{id}/active
    auth_required: true
  - name: Admin clients
    description: Admin manages clients and reviews appointment history.
    files:
      - frontend/src/features/admin/pages/AdminClientsPage.tsx
      - frontend/src/features/clients/api/clientsApi.ts
    entry_route: /admin/clients
    user_interactions:
      - Create and edit clients.
      - Search and sort clients.
      - Open client history.
      - Deactivate and reactivate clients.
    api_calls:
      - method: GET
        endpoint: /api/clients
      - method: POST
        endpoint: /api/clients
      - method: PUT
        endpoint: /api/clients/{id}
      - method: PATCH
        endpoint: /api/clients/{id}/active
      - method: GET
        endpoint: /api/appointments
    auth_required: true
known_limitations:
  - issue: Test run in Vite development mode may be limited to high-priority tests and lower concurrency.
    location: frontend dev server on port 5173
    impact: TestSprite may cap frontend execution to 15 tests for stability.
  - issue: Data-dependent booking tests require at least one active online-bookable service, compatible active professional, active business hours, and free future slot.
    location: admin service/professional/business-hour setup
    impact: Tests may need to create TS QA seed data before exercising end-to-end booking.
